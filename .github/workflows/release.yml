name: Release Linux

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Publish self-contained single-file
        run: dotnet publish NovaSCM.csproj -c Release -f net9.0 -r linux-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish
      - name: Smoke test — avvio headless (deve superare init Skia/SQLite)
        run: |
          sudo apt-get install -y -qq xvfb fontconfig fonts-dejavu-core
          chmod +x publish/NovaSCM
          mkdir -p ~/.config/NovaSCM
          (timeout 20 xvfb-run -a publish/NovaSCM > run.log 2>&1 &) ; sleep 15
          if grep -qE "Unhandled exception|DllNotFoundException" run.log; then cat run.log; exit 1; fi
      - name: Zip
        run: cd publish && zip "NovaSCM-${GITHUB_REF_NAME}-linux-x64.zip" NovaSCM
      - name: Upload asset alla release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: publish/NovaSCM-*.zip
